<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: #fffdfa; padding: 24px; }
  .row { display: flex; gap: 24px; margin-bottom: 16px; }
  .col { flex: 1; }
  .meta { font-family: 'Noto Sans JP', sans-serif; font-size: 10px; color: #6a5860; letter-spacing: 0.1em; margin-bottom: 5px; }
  hr { border: none; border-top: 1px solid rgba(212,160,48,0.15); margin: 12px 0; }
</style>
</head>
<body>
<div class="meta">Body Regular · Noto Sans JP 16px / 1.9</div>
<p style="font-family:'Noto Sans JP',sans-serif;font-size:15px;color:#4a3848;line-height:1.9;margin-bottom:12px">
  明朗会計でご安心ください。セット料金には飲み放題が含まれており、<br>隠れた追加費用は一切ございません。
</p>
<hr>
<div class="row">
  <div class="col">
    <div class="meta">Body Small · 14px muted</div>
    <p style="font-family:'Noto Sans JP',sans-serif;font-size:13px;color:#6a5860;line-height:1.7">営業時間 20:00〜翌3:00<br>定休日：月曜日</p>
  </div>
  <div class="col">
    <div class="meta">Price · Playfair Display Bold</div>
    <p style="font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:#a87a1a;line-height:1.2">¥3,500</p>
    <p style="font-family:'Noto Sans JP',sans-serif;font-size:11px;color:#6a5860;margin-top:2px">60分セット / 飲み放題込み</p>
  </div>
  <div class="col">
    <div class="meta">Badge / Tag · 12px pill</div>
    <span style="font-family:'Noto Sans JP',sans-serif;font-size:11px;font-weight:500;color:#e8698a;background:rgba(232,105,138,0.15);border:1px solid rgba(232,105,138,0.3);padding:3px 10px;border-radius:999px;letter-spacing:0.05em">人気No.1</span>
  </div>
</div>
</body>
</html>
