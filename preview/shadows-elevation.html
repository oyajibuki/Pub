<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: #fffdfa; font-family: 'Noto Sans JP', sans-serif; padding: 28px; }
  .row { display: flex; gap: 20px; flex-wrap: wrap; }
  .card { background: #f5f0ea; border-radius: 12px; padding: 16px 20px; flex: 1; min-width: 120px; }
  .name { font-size: 11px; color: #d4a030; letter-spacing: 0.1em; margin-bottom: 4px; }
  .val { font-size: 10px; color: #6a5860; }
</style>
</head>
<body>
<div class="row">
  <div class="card" style="box-shadow: 0 2px 8px rgba(0,0,0,0.3)">
    <div class="name">shadow-sm</div>
    <div class="val">0 2px 8px rgba(0,0,0,.3)</div>
  </div>
  <div class="card" style="box-shadow: 0 4px 24px rgba(0,0,0,0.5)">
    <div class="name">shadow-md</div>
    <div class="val">0 4px 24px rgba(0,0,0,.5)</div>
  </div>
  <div class="card" style="box-shadow: 0 8px 48px rgba(0,0,0,0.6)">
    <div class="name">shadow-lg</div>
    <div class="val">0 8px 48px rgba(0,0,0,.6)</div>
  </div>
  <div class="card" style="box-shadow: 0 0 20px rgba(212,160,48,0.25), 0 0 60px rgba(212,160,48,0.1); border: 1px solid rgba(212,160,48,0.4)">
    <div class="name">glow-gold</div>
    <div class="val">Gold glow / active state</div>
  </div>
  <div class="card" style="box-shadow: 0 0 20px rgba(232,105,138,0.3); border: 1px solid rgba(232,105,138,0.35)">
    <div class="name">glow-rose</div>
    <div class="val">Rose glow / highlight</div>
  </div>
  <div class="card" style="box-shadow: inset 0 1px 0 rgba(212,160,48,0.15), 0 4px 24px rgba(0,0,0,0.4); border: 1px solid rgba(212,160,48,0.3)">
    <div class="name">card-default</div>
    <div class="val">Card inset + outer</div>
  </div>
</div>
</body>
</html>
