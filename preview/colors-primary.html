<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: #fffdfa; font-family: 'Noto Sans JP', sans-serif; padding: 24px; }
  .row { display: flex; gap: 12px; margin-bottom: 12px; }
  .swatch { flex: 1; border-radius: 8px; height: 64px; display: flex; align-items: flex-end; padding: 8px 10px; }
  .swatch span { font-size: 11px; font-weight: 500; }
  .label { font-size: 11px; color: #6a5860; margin-bottom: 6px; letter-spacing: 0.1em; text-transform: uppercase; }
</style>
</head>
<body>
<p class="label">Primary — Gold</p>
<div class="row">
  <div class="swatch" style="background:#f0cc72"><span style="color:#120a1e">300 · #f0cc72</span></div>
  <div class="swatch" style="background:#e0b84a"><span style="color:#120a1e">400 · #e0b84a</span></div>
  <div class="swatch" style="background:#d4a030"><span style="color:#120a1e">500 · #d4a030</span></div>
  <div class="swatch" style="background:#a87a1a"><span style="color:#f5ede0">600 · #a87a1a</span></div>
</div>
<p class="label">Secondary — Rose</p>
<div class="row">
  <div class="swatch" style="background:#f8b0c4"><span style="color:#120a1e">300 · #f8b0c4</span></div>
  <div class="swatch" style="background:#f08aa6"><span style="color:#120a1e">400 · #f08aa6</span></div>
  <div class="swatch" style="background:#e8698a"><span style="color:#fff">500 · #e8698a</span></div>
  <div class="swatch" style="background:#c0486a"><span style="color:#fff">600 · #c0486a</span></div>
</div>
<p class="label">Tertiary — Coral</p>
<div class="row">
  <div class="swatch" style="background:#f8bc9a"><span style="color:#120a1e">400 · #f8bc9a</span></div>
  <div class="swatch" style="background:#f0a07a"><span style="color:#120a1e">500 · #f0a07a</span></div>
  <div class="swatch" style="background:rgba(240,160,122,0.15); border:1px solid rgba(240,160,122,0.3)"><span style="color:#f0a07a">Subtle</span></div>
</div>
</body>
</html>
