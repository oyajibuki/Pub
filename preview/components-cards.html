<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+JP:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: #fffdfa; font-family: 'Noto Sans JP', sans-serif; padding: 24px; }
  .row { display: flex; gap: 16px; }
  .card { background: #f5f0ea; border: 1px solid rgba(212,160,48,0.3); border-radius: 12px; overflow: hidden; box-shadow: inset 0 1px 0 rgba(212,160,48,0.15), 0 4px 24px rgba(0,0,0,0.4); transition: all 0.25s; }
  .card:hover { border-color: rgba(212,160,48,0.7); transform: translateY(-2px); box-shadow: 0 0 20px rgba(212,160,48,0.2), 0 8px 32px rgba(0,0,0,0.5); }

  /* Cast card */
  .cast-avatar { height: 100px; background: linear-gradient(135deg, #e8dccb 0%, #f0e8da 50%, #f8f2e8 100%); display: flex; align-items: center; justify-content: center; font-size: 36px; color: rgba(212,160,48,0.3); }
  .cast-body { padding: 14px 16px; }
  .cast-name { font-family: 'Shippori Mincho', serif; font-size: 18px; color: #1a1010; margin-bottom: 2px; }
  .cast-tag { font-size: 10px; color: #e8698a; background: rgba(232,105,138,0.12); border: 1px solid rgba(232,105,138,0.25); padding: 2px 8px; border-radius: 999px; }

  /* Price card */
  .price-card { padding: 20px; flex: 1.2; }
  .price-label { font-size: 11px; color: #d4a030; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; }
  .price-amount { font-family: 'Playfair Display', serif; font-size: 34px; font-weight: 700; color: #a87a1a; line-height: 1; margin-bottom: 4px; }
  .price-desc { font-size: 12px; color: #6a5860; margin-bottom: 12px; }
  .price-features li { font-size: 12px; color: #4a3848; line-height: 1.9; list-style: none; padding-left: 14px; position: relative; }
  .price-features li::before { content: '♪'; position: absolute; left: 0; color: #d4a030; font-size: 10px; top: 3px; }
</style>
</head>
<body>
<div class="row">
  <div class="card" style="width:130px">
    <div class="cast-avatar">♪</div>
    <div class="cast-body">
      <div class="cast-name">マリア</div>
      <span class="cast-tag">人気No.1</span>
    </div>
  </div>
  <div class="card" style="width:130px">
    <div class="cast-avatar" style="background:linear-gradient(135deg,#e4d4c8,#eee0d4)">♪</div>
    <div class="cast-body">
      <div class="cast-name">アンジェラ</div>
      <span class="cast-tag" style="color:#d4a030;background:rgba(212,160,48,0.12);border-color:rgba(212,160,48,0.25)">新人</span>
    </div>
  </div>
  <div class="card price-card">
    <div class="price-label">60分セット</div>
    <div class="price-amount">¥8,000</div>
    <div class="price-desc">飲み放題込み</div>
    <ul class="price-features">
      <li>ソフトドリンク飲み放題</li>
      <li>指名料込み</li>
      <li>延長30分 ¥1,500</li>
    </ul>
  </div>
</div>
</body>
</html>
