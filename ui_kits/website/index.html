<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/x-icon" href="../../favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="../../apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="../../favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../../favicon-16x16.png">
<title>Club Starlight — フィリピンパブ</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background-color: #0a1628;
    background-image: url('./bg-pub.png');
    background-size: cover;
    background-position: center top;
    background-attachment: fixed;
    color: #f0eee8;
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0a1628; }
  ::-webkit-scrollbar-thumb { background: rgba(0,56,168,0.4); border-radius: 3px; }

  /* ── Nav ── */
  .site-nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center;
    height: 64px; padding: 0 20px; gap: 12px;
    background: rgba(8,16,40,0.90);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(0,56,168,0.45);
  }
  .nav-logo { height: 44px; cursor: pointer; object-fit: contain; flex-shrink: 0; }
  .nav-links {
    display: flex; gap: 0; flex: 1;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .nav-links::-webkit-scrollbar { display: none; }
  .nav-link {
    font-size: 13px; color: #c8d8e8; letter-spacing: 0.05em; cursor: pointer;
    padding: 4px 16px; white-space: nowrap; border-bottom: 2px solid transparent;
    transition: all 0.2s; font-family: 'Noto Sans JP', sans-serif;
    flex-shrink: 0;
  }
  .nav-link.active { color: #ffffff; border-bottom-color: #ffffff; }
  .nav-link:hover { color: #ffffff; }
  .nav-cta {
    flex-shrink: 0; background: #CE1126; color: #ffffff;
    font-size: 13px; font-weight: 700; padding: 8px 18px;
    border-radius: 6px; cursor: pointer; border: none;
    letter-spacing: 0.05em; font-family: 'Noto Sans JP', sans-serif;
    white-space: nowrap;
  }
  .nav-cta:hover { background: #e8364a; }

  /* ── Section ── */
  .section-inner { padding: 80px 40px; max-width: 1100px; margin: 0 auto; }

  /* ── Dance schedule ── */
  .sched-row {
    display: flex; align-items: center; gap: 20px;
    padding: 16px 0;
    border-bottom: 1px solid rgba(0,56,168,0.25);
  }
  .sched-row:last-child { border-bottom: none; }
  .sched-dot { flex-shrink: 0; width: 10px; height: 10px; border-radius: 50%; }
  .sched-time {
    font-family: 'Shippori Mincho', serif; font-size: 15px; color: #ffffff;
    min-width: 148px; flex-shrink: 0;
  }
  .sched-event { flex: 1; }
  .sched-event-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
  .sched-event-name { font-size: 14px; color: #f0eee8; font-family: 'Noto Sans JP', sans-serif; font-weight: 500; }
  .sched-performers { font-size: 12px; color: #8aa4be; font-family: 'Noto Sans JP', sans-serif; }

  /* ── Mobile ── */
  @media (max-width: 600px) {
    .section-inner { padding: 60px 16px; }

    /* Dance schedule — stack time above event */
    .sched-row { flex-wrap: wrap; gap: 8px; padding: 14px 0; align-items: flex-start; }
    .sched-time-row { display: flex; align-items: center; gap: 10px; width: 100%; }
    .sched-time { min-width: unset; font-size: 13px; }
    .sched-event { width: 100%; padding-left: 20px; }
    .sched-event-name { font-size: 14px; }

    /* Hero */
    .hero-h1 { font-size: 40px !important; }
    .hero-sub { font-size: 13px !important; }
    .stats-row { gap: 20px !important; padding: 20px 16px !important; }

    /* Section heading */
    .section-heading { padding: 20px 16px !important; }
    .section-heading h2 { font-size: 26px !important; }

    /* Nav logo */
    .nav-logo { height: 36px; }
    .nav-link { padding: 4px 10px; font-size: 12px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel" src="HomePage.jsx"></script>
<script type="text/babel" src="CastPage.jsx"></script>
<script type="text/babel" src="PricingPage.jsx"></script>
<script type="text/babel" src="DancePage.jsx"></script>
<script type="text/babel" src="AccessPage.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const PAGES = {
  home:    () => <HomePage    onNav={setPage} />,
  cast:    () => <CastPage    />,
  pricing: () => <PricingPage />,
  dance:   () => <DancePage   />,
  access:  () => <AccessPage  />,
};

let setPage;

function App() {
  const [page, _setPage] = useState(() => {
    return localStorage.getItem('clubrosa_page') || 'home';
  });
  setPage = (p) => {
    _setPage(p);
    localStorage.setItem('clubrosa_page', p);
    window.scrollTo({ top: 0 });
  };

  const PageComponent = PAGES[page] || PAGES.home;

  return (
    <div>
      <Nav page={page} onNav={setPage} />
      <main>
        <PageComponent onNav={setPage} />
      </main>
      <GoldDivider />
      <Footer />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

<!-- Tweaks panel -->
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "storeName": "Club Starlight",
  "tagline": "今夜も笑顔でお迎えします",
  "goldColor": "#FCD116",
  "roseColor": "#e8364a",
  "bgColor": "#08101e"
}/*EDITMODE-END*/;

(function() {
  let tweaks = { ...TWEAK_DEFAULTS };
  let panelVisible = false;

  function applyTweaks(t) {
    document.documentElement.style.setProperty('--tw-gold', t.goldColor);
    document.documentElement.style.setProperty('--tw-rose', t.roseColor);
    document.documentElement.style.setProperty('--tw-bg', t.bgColor);
  }

  function buildPanel() {
    const panel = document.createElement('div');
    panel.id = 'tweaks-panel';
    panel.style.cssText = `
      position:fixed;bottom:24px;right:24px;z-index:9999;
      background:#1e1230;border:1px solid rgba(212,160,48,0.4);border-radius:12px;
      padding:20px;min-width:220px;box-shadow:0 8px 40px rgba(0,0,0,0.6);
      font-family:'Noto Sans JP',sans-serif;display:none;
    `;
    panel.innerHTML = `
      <div style="font-size:12px;font-weight:700;color:#d4a030;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:16px">Tweaks</div>
      <label style="display:block;margin-bottom:12px">
        <div style="font-size:11px;color:#8a7490;margin-bottom:4px">店名</div>
        <input id="tw-storeName" type="text" value="${tweaks.storeName}"
          style="width:100%;background:#2a1a40;border:1px solid rgba(212,160,48,0.25);color:#f5ede0;padding:6px 10px;border-radius:6px;font-size:12px;outline:none;font-family:inherit" />
      </label>
      <label style="display:block;margin-bottom:12px">
        <div style="font-size:11px;color:#8a7490;margin-bottom:4px">キャッチコピー</div>
        <input id="tw-tagline" type="text" value="${tweaks.tagline}"
          style="width:100%;background:#2a1a40;border:1px solid rgba(212,160,48,0.25);color:#f5ede0;padding:6px 10px;border-radius:6px;font-size:12px;outline:none;font-family:inherit" />
      </label>
      <label style="display:block;margin-bottom:12px">
        <div style="font-size:11px;color:#8a7490;margin-bottom:4px">アクセントカラー (Gold)</div>
        <div style="display:flex;gap:8px;align-items:center">
          <input id="tw-goldColor" type="color" value="${tweaks.goldColor}" style="width:36px;height:28px;border-radius:4px;border:none;cursor:pointer" />
          <span id="tw-goldVal" style="font-size:11px;color:#8a7490">${tweaks.goldColor}</span>
        </div>
      </label>
      <label style="display:block;margin-bottom:12px">
        <div style="font-size:11px;color:#8a7490;margin-bottom:4px">アクセントカラー (Rose)</div>
        <div style="display:flex;gap:8px;align-items:center">
          <input id="tw-roseColor" type="color" value="${tweaks.roseColor}" style="width:36px;height:28px;border-radius:4px;border:none;cursor:pointer" />
          <span id="tw-roseVal" style="font-size:11px;color:#8a7490">${tweaks.roseColor}</span>
        </div>
      </label>
      <label style="display:block;margin-bottom:0">
        <div style="font-size:11px;color:#8a7490;margin-bottom:4px">背景色</div>
        <div style="display:flex;gap:8px;align-items:center">
          <input id="tw-bgColor" type="color" value="${tweaks.bgColor}" style="width:36px;height:28px;border-radius:4px;border:none;cursor:pointer" />
          <span id="tw-bgVal" style="font-size:11px;color:#8a7490">${tweaks.bgColor}</span>
        </div>
      </label>
    `;
    document.body.appendChild(panel);

    const post = (edits) => window.parent.postMessage({ type:'__edit_mode_set_keys', edits }, '*');

    panel.querySelector('#tw-storeName').addEventListener('input', e => {
      tweaks.storeName = e.target.value;
      post({ storeName: tweaks.storeName });
    });
    panel.querySelector('#tw-tagline').addEventListener('input', e => {
      tweaks.tagline = e.target.value;
      post({ tagline: tweaks.tagline });
    });
    panel.querySelector('#tw-goldColor').addEventListener('input', e => {
      tweaks.goldColor = e.target.value;
      panel.querySelector('#tw-goldVal').textContent = e.target.value;
      document.documentElement.style.setProperty('--tw-gold', tweaks.goldColor);
      post({ goldColor: tweaks.goldColor });
    });
    panel.querySelector('#tw-roseColor').addEventListener('input', e => {
      tweaks.roseColor = e.target.value;
      panel.querySelector('#tw-roseVal').textContent = e.target.value;
      document.documentElement.style.setProperty('--tw-rose', tweaks.roseColor);
      post({ roseColor: tweaks.roseColor });
    });
    panel.querySelector('#tw-bgColor').addEventListener('input', e => {
      tweaks.bgColor = e.target.value;
      panel.querySelector('#tw-bgVal').textContent = e.target.value;
      document.body.style.background = tweaks.bgColor;
      post({ bgColor: tweaks.bgColor });
    });
  }

  window.addEventListener('message', (e) => {
    if (e.data?.type === '__activate_edit_mode') {
      panelVisible = true;
      const p = document.getElementById('tweaks-panel');
      if (p) p.style.display = 'block';
    }
    if (e.data?.type === '__deactivate_edit_mode') {
      panelVisible = false;
      const p = document.getElementById('tweaks-panel');
      if (p) p.style.display = 'none';
    }
  });

  window.parent.postMessage({ type: '__edit_mode_available' }, '*');

  document.addEventListener('DOMContentLoaded', () => {
    buildPanel();
    applyTweaks(tweaks);
  });
  if (document.readyState !== 'loading') {
    buildPanel();
    applyTweaks(tweaks);
  }
})();
</script>
</body>
</html>
